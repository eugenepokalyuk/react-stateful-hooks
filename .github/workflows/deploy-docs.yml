name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'package.json'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json

      # Build the library: the docs site imports it via a file: dependency,
      # which resolves to dist/.
      - run: npm ci
      - run: npm run build

      # Build the docs static export. BASE_PATH matches the GitHub Pages
      # sub-path; the postbuild step runs Pagefind and writes the root redirect.
      - name: Build docs
        working-directory: docs
        env:
          BASE_PATH: /react-stateful-hooks
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
