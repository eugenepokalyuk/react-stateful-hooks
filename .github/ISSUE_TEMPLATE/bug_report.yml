name: Bug report
description: Something isn't working as documented
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the sections below.
  - type: input
    id: hook
    attributes:
      label: Which hook?
      placeholder: useLocalStorageState
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a link to a StackBlitz/CodeSandbox that reproduces it.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions of react-stateful-hooks, react, the framework (Next.js/Remix/Vite), and browser.
      placeholder: |
        - react-stateful-hooks: 0.1.3
        - react: 18.3.1
        - framework: Next.js 15
        - browser: Chrome 126
    validations:
      required: true
  - type: checkboxes
    id: ssr
    attributes:
      label: Context
      options:
        - label: This happens during SSR / hydration
        - label: This involves cross-tab sync
